[sampling]
interval_seconds = 2
min_interval = 1
max_interval = 60

[storage]
db_path = "nmon.db"
retention_hours = 24

[display]
default_tab = "dashboard"
default_time_window_hours = 1
# Temp-tab threshold line (first-run default). After the first run the
# live value and on/off state are persisted in .nmon_state.json next to
# the DB and override these values on the next startup.
temp_threshold_c = 95.0
show_temp_threshold = true

[ollama]
# Set enabled=false to skip Ollama detection entirely. When enabled, nmon
# probes this URL at startup and (if reachable) polls /api/ps every sampling
# interval for the currently loaded model and its GPU/CPU split.
enabled = true
url = "http://localhost:11434"
